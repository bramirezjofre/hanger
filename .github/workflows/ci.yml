name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install poetry==2.2.1
      - run: poetry install -E dev --no-interaction
      - run: poetry run python -m compileall -q src tests
      - run: poetry run ruff check src tests
      - run: poetry run pytest -q --cov=hanger_app --cov-report=term-missing --cov-fail-under=80

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build --tag hanger:ci .
