<!DOCTYPE html>
  <head>
    <meta charset = "UTF-8"/>
    <meta name = "author" content = "Martina Pauer"/>
    <meta name = "viewport" content = "height=device-height,width=device-width,initial-scale=1.0"/>
    <title>New User: Hanger Stepsr</title>
  </head>
  <body>
    <form id = "registerUser" name = "registerUser" method = "POST" action = "registered">
      <label>Username:</label>
      <input id = "userName" name = "userName" type = "text"/>
      <label>Age:</label>
      <input id = "userAge" name = "userAge" type = "number" min = "1" max = "300" />
      <label>Contact Address:</label>
      <input id = "userContact" name = "userContact" type = "text" />
      <label>Contact Type:</label>
      <input id = "contactKind" name = "contactKind" type = "text" />
      <label>Password:</label>
      <input id = "userPassword" name = "userPassword" type = "password" />
      <label>Retype Password:</label>
      <input id = "verifyPassword" name = "verifyPassword" type = "password" />
      <input id = "addUser" name = "addUser" type = "submit" />
    </form>
  </body>
</html>
